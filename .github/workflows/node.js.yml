# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [23.x, 24.x, 25.x]
        # Testing on the latest and experimental Node versions as requested

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - run: npm ci
    
    - name: Build
      run: npm run build --if-present
    
    - name: Smoke Test
      # Starts the bot and waits 30 seconds to ensure it doesn't crash on startup.
      # timeout returns exit code 124 when it times out, which we treat as success for a long-running process.
      run: |
        timeout 30s npm test ${{ secrets.TOKEN }} ${{ secrets.MAILPW }} ${{ secrets.MAILADRESS }} ${{ secrets.MYMAILADRESS }} ${{ secrets.DB_PASSWORD }} ${{ secrets.DB }} ${{ secrets.TRELLOKEY }} ${{ secrets.TRELLOTOKEN }} || [ $? -eq 124 ]
